name: Analyze U.S. Market

on:
  schedule:
    # GitHub Actions schedules use UTC. This corresponds to 19:00 IST.
    - cron: "30 13 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  analyze-us-market:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --locked

      - name: Analyze SPY and QQQ
        run: |
          uv run pie analyze-market SPY
          uv run pie analyze-market QQQ

      - name: Commit market reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/market/*.txt
          git diff --cached --quiet || git commit -m "chore: store US market reports"
          git push
