name: Analyze U.S. Market

on:
  schedule:
    # 19:00 IST
    - cron: "30 13 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  analyze-us-market:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --locked

      - name: Generate market reports
        run: |
          mkdir -p reports/market

          uv run pie analyze-market SPY > reports/market/SPY.txt
          uv run pie analyze-market QQQ > reports/market/QQQ.txt

      - name: Debug generated files
        run: |
          echo "Generated files:"
          find reports -type f -print

          echo
          echo "Contents:"
          ls -R reports

      - name: Verify reports exist
        run: |
          test -f reports/market/SPY.txt
          test -f reports/market/QQQ.txt

      - name: Commit market reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add reports/market/

          if git diff --cached --quiet; then
            echo "No report changes."
            exit 0
          fi

          git commit -m "chore: store US market reports"
          git push
