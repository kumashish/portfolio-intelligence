name: Analyze U.S. Market

concurrency:
  group: us-market-analysis
  cancel-in-progress: false

on:
  schedule:
    # Every hour, Sun 8:30 PM ET through Fri 3:30 PM ET (continuous overnight
    # coverage, no gap). Anchored to EDT (UTC-4), the currently-active US
    # Eastern offset — this needs to be shifted to UTC-5 manually when the
    # US switches to EST (~early Nov) and back to UTC-4 in March.
    #
    # Converting ET->UTC and accounting for the weekday rollover collapses
    # to just two ranges:
    #   - every hour Mon-Thu UTC (covers Sun 8:30PM ET onward, continuously)
    #   - hours 00:30-19:30 UTC on Fri (covers up to Fri 3:30 PM ET)
    - cron: "30 * * * 1-4"
    - cron: "30 0-19 * * 5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  analyze-us-market:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4.2.2

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --locked

      - name: Analyze market
        run: |
          for SYMBOL in SPY QQQ; do
            echo "Analyzing ${SYMBOL}"
            uv run pie analyze-market "$SYMBOL"
          done

      - name: Update README snapshot
        run: uv run pie readme update-readme-snapshot

      - name: Commit and push market reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add reports/market/ state/ README.md

          if git diff --cached --quiet; then
            echo "No report changes."
            exit 0
          fi

          git commit -m "chore: store US market reports and README snapshot"
          git push
