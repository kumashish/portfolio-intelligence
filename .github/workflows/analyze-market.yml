- name: Analyze market
  shell: bash
  run: |
    set -euo pipefail

    FAILED=0

    analyze_symbol() {
      local SYMBOL="$1"

      echo "::group::${SYMBOL}"

      SUCCESS=0

      for ATTEMPT in 1 2 3; do
        echo "Attempt ${ATTEMPT}/3"

        if uv run pie analyze-market "${SYMBOL}"; then
          SUCCESS=1
          break
        fi

        if [ "$ATTEMPT" -lt 3 ]; then
          echo "Retrying in 15 seconds..."
          sleep 15
        fi
      done

      if [ "$SUCCESS" -eq 0 ]; then
        echo "::error::Failed to analyze ${SYMBOL}"
        FAILED=1
      fi

      echo "::endgroup::"
    }

    if [ -n "${{ inputs.symbol }}" ]; then
      echo "Running analysis for manually supplied symbol..."
      analyze_symbol "${{ inputs.symbol }}"

    elif [ -f config/market_symbols.txt ]; then
      echo "Using symbols from config/market_symbols.txt"

      while IFS= read -r SYMBOL || [ -n "$SYMBOL" ]; do
        # Trim whitespace
        SYMBOL="$(echo "$SYMBOL" | xargs)"

        # Ignore blank lines and comments
        [[ -z "$SYMBOL" ]] && continue
        [[ "$SYMBOL" =~ ^# ]] && continue

        analyze_symbol "$SYMBOL"

      done < config/market_symbols.txt

    else
      echo "No config/market_symbols.txt found."
      echo "Using default symbols: ^NSEI ^NSEBANK"

      analyze_symbol "^NSEI"
      analyze_symbol "^NSEBANK"
    fi

    exit $FAILED
