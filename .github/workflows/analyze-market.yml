name: Analyze Market

concurrency:
  group: market-analysis
  cancel-in-progress: false

on:
  schedule:
    # Every hour, 10:20 AM to 3:20 PM IST, Monday-Friday only (NSE trading
    # session). These land at :50 past the hour in UTC, which naturally
    # avoids the top-of-the-hour minute GitHub Actions schedules are most
    # likely to be delayed or dropped under load.
    - cron: "50 4 * * 1-5"  # 10:20 IST
    - cron: "50 5 * * 1-5"  # 11:20 IST
    - cron: "50 6 * * 1-5"  # 12:20 IST
    - cron: "50 7 * * 1-5"  # 13:20 IST
    - cron: "50 8 * * 1-5"  # 14:20 IST
    - cron: "50 9 * * 1-5"  # 15:20 IST

  workflow_dispatch:
    inputs:
      symbol:
        description: Yahoo Finance symbol (leave blank to run default symbols)
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  analyze-market:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --locked

      - name: Analyze market
        run: |
          if [ -n "${{ inputs.symbol }}" ]; then
            SYMBOLS="${{ inputs.symbol }}"
          else
            SYMBOLS="^NSEI ^NSEBANK"
          fi

          for SYMBOL in $SYMBOLS; do
            echo "Analyzing ${SYMBOL}"
            uv run pie analyze-market "$SYMBOL"
          done

      - name: Update README snapshot
        run: uv run pie readme update-readme-snapshot

      - name: Commit and push market reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add reports/market/ state/ README.md

          if git diff --cached --quiet; then
            echo "No report changes."
            exit 0
          fi

          git commit -m "chore: update market reports and README snapshot"
          git push
