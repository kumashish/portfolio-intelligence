name: Analyze Market

concurrency:
  group: market-analysis
  cancel-in-progress: false

on:
  schedule:
    # 10:30, 13:30 and 15:20 IST
    - cron: "0 5 * * *"
    - cron: "0 8 * * *"
    - cron: "50 9 * * *"

  workflow_dispatch:
    inputs:
      symbol:
        description: Yahoo Finance symbol (leave blank to run default symbols)
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  analyze-market:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --locked

      - name: Analyze market
        run: |
          if [ -n "${{ inputs.symbol }}" ]; then
            SYMBOLS="${{ inputs.symbol }}"
          else
            SYMBOLS="^NSEI ^NSEBANK"
          fi

          for SYMBOL in $SYMBOLS; do
            echo "Analyzing ${SYMBOL}"
            uv run pie analyze-market "$SYMBOL"
          done

      - name: Commit market reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add reports/market/

          if git diff --cached --quiet; then
            echo "No report changes."
            exit 0
          fi

          git commit -m "chore: update market reports"
          
# snippet to add near the end of any workflow
- name: Trigger README update
  uses: peter-evans/repository-dispatch@v2
  with:
    token: ${{ secrets.GITHUB_TOKEN }}
    event-type: update-readme
    client-payload: '{"source_workflow":"${{ github.workflow }}","ref":"${{ github.ref }}"}'
    
