name: Analyze Market

concurrency:
  group: market-analysis
  cancel-in-progress: false

on:
  schedule:
    # Every hour from 10:20 AM to 3:20 PM IST (Mon-Fri)
    - cron: "50 4-9 * * 1-5"

  workflow_dispatch:
    inputs:
      symbol:
        description: Yahoo Finance symbol (leave blank to use configured symbols)
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  analyze-market:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Analyze market
        shell: bash
        run: |
          set -euo pipefail

          analyze_symbol() {
            local SYMBOL="$1"

            echo "::group::${SYMBOL}"

            for ATTEMPT in 1 2 3; do
              echo "Attempt ${ATTEMPT}/3"

              if uv run pie analyze-market "${SYMBOL}"; then
                echo "::endgroup::"
                return 0
              fi

              if [ "$ATTEMPT" -lt 3 ]; then
                echo "Retrying in 15 seconds..."
                sleep 15
              fi
            done

            echo "::error::Failed to analyze ${SYMBOL}"
            echo "::endgroup::"

            return 1
          }

          if [ -n "${{ inputs.symbol }}" ]; then
            echo "Running analysis for manually supplied symbol..."
            SYMBOLS="${{ inputs.symbol }}"

          elif [ -f config/market_symbols.txt ]; then
            echo "Using symbols from config/market_symbols.txt"

            SYMBOLS=$(grep -vE '^[[:space:]]*#|^[[:space:]]*$' config/market_symbols.txt)

          else
            echo "No config/market_symbols.txt found."
            echo "Using default symbols: ^NSEI ^NSEBANK"

            SYMBOLS="^NSEI ^NSEBANK"
          fi

          FAILED_SYMBOLS=""

          for SYMBOL in $SYMBOLS; do
            if ! analyze_symbol "$SYMBOL"; then
              FAILED_SYMBOLS="${FAILED_SYMBOLS} ${SYMBOL}"
            fi
          done

          FAILED_SYMBOLS="$(echo "$FAILED_SYMBOLS" | xargs || true)"

          if [ -n "$FAILED_SYMBOLS" ]; then
            echo "FAILED_SYMBOLS=$FAILED_SYMBOLS" >> "$GITHUB_ENV"
          fi

      - name: Update README snapshot
        run: uv run pie readme update-readme-snapshot

      - name: Commit and push market reports
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add reports/market state README.md
          
          if git diff --cached --quiet; then
              echo "No report changes."
              exit 0
          fi
          
          git commit -m "chore: update market reports and README snapshot"        
          git push origin HEAD:main || echo "Push failed (likely due to a concurrent update). Changes will be regenerated on the next scheduled run."

      - name: Report failed symbols
        if: env.FAILED_SYMBOLS != ''
        run: |
          echo "::warning::Market analysis failed for:"
          echo "${FAILED_SYMBOLS}"
